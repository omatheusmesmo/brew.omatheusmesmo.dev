name: Deploy Brew to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "images/**"
      - "LICENSE"
      - "README.md"
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Build site
        run: QUARKUS_ROQ_GENERATOR_BATCH=true mvn package quarkus:run -DskipTests
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/roq

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-readme:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout brew
        uses: actions/checkout@v4
      - name: Checkout profile
        uses: actions/checkout@v4
        with:
          repository: omatheusmesmo/omatheusmesmo
          path: profile-repo
          token: ${{ secrets.PROFILE_README_TOKEN }}
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Update README
        run: chmod +x scripts/update-readme-brew && scripts/update-readme-brew
        env:
          README_PATH: profile-repo/README.md
      - name: Push README changes
        if: success()
        run: |
          cd profile-repo
          git config user.name "Matheus Oliveira"
          git config user.email "matheus.6148@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update brew list"
          git push
