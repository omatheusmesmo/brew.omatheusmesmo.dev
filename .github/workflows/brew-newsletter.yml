name: Brew Newsletter

on:
  push:
    branches: [main]
    paths: ['data/brews/*.yml']
  workflow_dispatch:
    inputs:
      brew_slug:
        description: 'Brew slug to send (e.g. 2026-07-01). Leave empty to auto-detect from changed files.'
        required: false
        type: string

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Roq Site (future enabled)
        uses: quarkiverse/quarkus-roq@v1.1
        with:
          github-pages: false
          site-future: "true"

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Determine brew slug
        id: brew
        run: |
          if [ -n "${{ inputs.brew_slug }}" ]; then
            echo "slug=${{ inputs.brew_slug }}" >> $GITHUB_OUTPUT
            echo "send=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 -- data/brews/*.yml | head -1)
            if [ -n "$CHANGED" ]; then
              SLUG=$(basename "$CHANGED" .yml)
              echo "slug=$SLUG" >> $GITHUB_OUTPUT
              echo "send=true" >> $GITHUB_OUTPUT
            else
              echo "send=false" >> $GITHUB_OUTPUT
            fi
          else
            LATEST=$(ls data/brews/*.yml 2>/dev/null | sort -r | head -1)
            if [ -n "$LATEST" ]; then
              SLUG=$(basename "$LATEST" .yml)
              echo "slug=$SLUG" >> $GITHUB_OUTPUT
              echo "send=true" >> $GITHUB_OUTPUT
            else
              echo "send=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Schedule email
        if: steps.brew.outputs.send == 'true'
        run: chmod +x scripts/send-newsletter && scripts/send-newsletter --schedule ${{ steps.brew.outputs.slug }}
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
